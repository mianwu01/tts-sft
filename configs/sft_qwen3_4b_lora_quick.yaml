# Stage 2/3 — first real LoRA comparison
#
# Purpose: produce the first apples-to-apples comparison between
# Raw-self-SFT and SqueezeEvolve-SFT. Use this config for BOTH runs and
# change only --train-file / --output-dir. Any hyperparameter difference
# between the two runs invalidates the comparison.
#
# Effective batch size = 64 on a single GPU
#   per_device_train_batch_size * gradient_accumulation_steps * world_size
#       = 1 * 64 * 1 = 64
#
# Multi-GPU adjustment: keep effective batch = 64. Examples:
#   2 GPUs -> gradient_accumulation_steps: 32
#   4 GPUs -> gradient_accumulation_steps: 16
#   8 GPUs -> gradient_accumulation_steps: 8
# (Override on the CLI: `--gradient-accumulation-steps 8`.)
#
# Sequence length: 8192 is the safe default. Bumping to 16384 may be
# possible on 80GB H100 with bf16 + gradient checkpointing — try
# `--max-seq-length 16384` once the 8k run is stable.
#
# Step budget: defaults to one full epoch. Set --max-steps on the CLI
# (e.g. --max-steps 800) if the dataset is small and you'd rather pin
# the optimizer step count than the epoch count.

model_name_or_path: Qwen/Qwen3-4B-Thinking-2507

use_lora: true
bf16: true
max_seq_length: 8192          # bump to 16384 if memory permits

learning_rate: 2.0e-5
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 64

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

gradient_checkpointing: true
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 0.2
lr_scheduler_type: cosine

adam_beta1: 0.9
adam_beta2: 0.999

logging_steps: 10
save_steps: 200
seed: 42
report_to: none
