# LoRA SFT defaults for the raw self-generated dataset.
model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
train_file: data/sft/raw_self_sft_train.jsonl
output_dir: outputs/qwen3_4b_raw_sft

use_lora: true
bf16: true
max_seq_length: 8192

learning_rate: 5.0e-6
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 16

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

gradient_checkpointing: true
logging_steps: 10
save_steps: 200
warmup_ratio: 0.03
seed: 42
report_to: none
