# Reference profile for the default base model used across the experiment.
model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
dtype: bfloat16
trust_remote_code: true
max_seq_length: 8192

chat:
  preserve_thinking: true   # keep <think>...</think> in SFT assistant turns

generation_defaults:
  temperature: 0.6
  top_p: 0.95
  max_tokens: 8192

vllm_serve:
  host: 0.0.0.0
  port: 8000
  max_model_len: 8192
  gpu_memory_utilization: 0.90
