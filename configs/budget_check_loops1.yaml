# Tiny SE budget-accounting check — loops=1. NOT a capability/data run.
# Verifies N_i = population*loops via official metrics (model_0_count). strip_think=true + max_tokens 256 = fast.
run_name: tts_sft_se_budget_check_loops1_node1
routing:
  k: 4
  population: 16
  groups: 16
  loops: 1
  confidence_percentiles: []
  fitness: diversity
  selection: uniform
  selection_temperature: 1.0
  update: replace
  lite_fraction: 0.0
  lite_method: majority
  recombination: aime25-aggregate
  evaluation: aime25-none
  task: math
  generation_batch_size: 16
  strip_think: true
  seed: 1234
models:
  - name: Qwen/Qwen3-4B-Thinking-2507
    base_url: http://localhost:8000/v1
    api_key: EMPTY
    endpoint: chat
    max_tokens: 256
    temperature: 0.6
    top_p: 0.95
    max_concurrency: 16
retry:
  request_timeout_seconds: 600
resume: false
checkpoint_dir: ./outputs/node1_budget_check/loops1/checkpoints
metrics_path: ./outputs/node1_budget_check/loops1/metrics.json
